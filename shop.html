<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop All — Roaathawra</title>
  <meta name="description" content="Browse all made-to-order Roaathawra furniture. DM to order.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body>
  <div data-site-header></div>

  <main class="cs-light">
    <section class="section--tight">
      <div class="page">
        <div class="row-head" style="border-bottom:1px solid var(--c-border);padding-bottom:20px">
          <div>
            <div class="kicker">The Collection</div>
            <h1 data-shop-title>All Furniture</h1>
          </div>
          <span class="card-price" data-shop-count></span>
        </div>
        <div class="grid grid--4" data-shop-grid></div>
      </div>
    </section>
  </main>

  <div data-site-footer></div>

  <script src="assets/catalog.js"></script>
  <script src="assets/app.js"></script>

</html>
